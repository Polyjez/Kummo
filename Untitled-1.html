<!DOCTYPE html>
<html>
<head>
  <title>Test Final</title>
  <!-- Charger le SDK Supabase UNIQUEMENT ici pour le test -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Test Final</h1>
  <div id="result"></div>

  <!-- Initialiser Supabase -->
  <script>
    // Initialiser Supabase pour ce test
    window.supabase = supabase.createClient(
      'https://xusuvidhmuyzpfrtxutd.supabase.co',
      'sb_publishable_b1E4qrzlctLblwro4yoCOw_tGVc3EtT'
    );
  </script>

  <!-- Tester la connexion à la table 'shops' -->
  <script>
    window.supabase
      .from('shops')  // ✅ Utiliser 'shops' sans 'public.'
      .select('*')
      .then(({ data, error }) => {
        if (error) {
          document.getElementById('result').innerHTML = `<p style="color:red">Erreur: ${error.message}</p>`;
        } else {
          document.getElementById('result').innerHTML = `<p style="color:green">✅ ${data.length} magasins chargés depuis 'shops' !</p>`;
        }
      });
  </script>
</body>
</html>
