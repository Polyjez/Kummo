<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mein Profil — Kummo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/kummo.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">Kum<span>mo</span></a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="main-nav">☰ Menü</button>
      <nav class="nav-main" id="main-nav">
        <a href="suchen.html">Aktivitäten</a>
        <a href="profil.html" aria-current="page">Mein Profil</a>
        <a href="business.html">Für Anbieter</a>
        <a href="admin.html">Admin</a>
        <a href="#" id="logout-btn" style="display: none;">Abmelden</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:2rem 0 4rem">
    <h1>Mein Profil</h1>
    <p>Eure Daten und Vorlieben — für personalisierte Empfehlungen</p>

    <section class="section" style="padding-top:1rem">
      <h2>Persönliche Daten & Vorlieben</h2>
      <form id="prefs-form" class="search-panel" style="max-width:520px">
        <div class="form-row">
          <label for="name">Name</label>
          <input id="name" name="name" autocomplete="name">
        </div>
        <div class="form-row">
          <label for="email">E-Mail</label>
          <input id="email" name="email" type="email" autocomplete="email">
        </div>
        <div class="form-row">
          <label for="age">Bevorzugte Altersgruppe</label>
          <select id="age" name="age">
            <option value="">—</option>
            <option value="0-5">0–5 Jahre</option>
            <option value="6-12">6–12 Jahre</option>
            <option value="13-18">13–18 Jahre</option>
            <option value="senioren">Senioren</option>
            <option value="familie">Ganze Familie</option>
          </select>
        </div>
        <div class="form-row">
          <label for="maxBudget">Budget (max. € pro Person)</label>
          <input id="maxBudget" name="maxBudget" type="number" min="0">
        </div>
        <div class="form-row">
          <label for="location">Bevorzugter Stadtteil</label>
          <input id="location" name="location" placeholder="z. B. Prenzlauer Berg">
        </div>
        <button type="submit" class="btn btn-primary">Speichern</button>
      </form>
    </section>

    <section class="section">
      <h2>Für euch empfohlen</h2>
      <div class="activity-grid" id="recommendations"></div>
    </section>

    <section class="section">
      <h2>Buchungshistorie</h2>
      <div id="booking-history"></div>
    </section>

    <section class="section">
      <h2>Favoriten</h2>
      <div class="activity-grid" id="favorites-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p class="footer-bottom container">© 2026 Kummo</p>
  </footer>

  <!-- Load the Supabase SDK and initialize the client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    window.supabase = supabase.createClient(
      'https://xusuvidhmuyzpfrtxutd.supabase.co',
      'sb_publishable_b1E4qrzlctLblwro4yoCOw_tGVc3EtT'
    );
  </script>
  <!-- Load app.js -->
  <script src="js/app.js" defer></script>
</body>
</html>
